name: Release

# Push to `main` or run manually to build downloadable release artifacts.
# Tag a commit (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build and
# publish the macOS (Apple Silicon) and Windows installers to a GitHub Release.
#
# Signing is automatic: if the relevant secrets are set the build is signed (and
# macOS is notarized); if they are absent an unsigned installer is produced.
#   macOS  : MAC_CSC_LINK (base64 .p12), MAC_CSC_KEY_PASSWORD,
#            APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID (for notarize)
#   Windows: WIN_CSC_LINK (base64 .pfx), WIN_CSC_KEY_PASSWORD
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon runner -> arm64
            artifacts: |
              dist/*.dmg
              dist/*.dmg.blockmap
          - os: windows-latest
            artifacts: |
              dist/*.exe
              dist/*.exe.blockmap

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build app bundle
        run: npm run build

      - name: Package installer (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -n "${CSC_LINK}" ]; then
            if [ -n "${APPLE_ID}" ]; then NOTARIZE="-c.mac.notarize=true"; else NOTARIZE=""; fi
            echo "::notice::macOS — signing${APPLE_ID:+ + notarizing}"
            npx electron-builder --mac --arm64 $NOTARIZE
          else
            echo "::warning::macOS — no signing secrets, building UNSIGNED"
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --arm64
          fi
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        # electron-builder signs when CSC_LINK is provided and silently skips
        # signing when it is empty — no branching needed on Windows.
        run: npx electron-builder --win --x64
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plug-${{ runner.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false
