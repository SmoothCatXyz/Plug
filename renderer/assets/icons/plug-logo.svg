<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <title>Plug Logo</title>
  <!-- 外框：方形 + 折角装饰 -->
  <path d="M 4 12 L 4 4 L 12 4" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
  <path d="M 52 4 L 60 4 L 60 12" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
  <path d="M 60 52 L 60 60 L 52 60" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
  <path d="M 12 60 L 4 60 L 4 52" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>

  <!-- Entry Plug 圆柱俯视 -->
  <circle cx="32" cy="32" r="18" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="32" cy="32" r="12" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="32" cy="32" r="4" fill="currentColor"/>

  <!-- 十字基准线 -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="32" y1="46" x2="32" y2="54" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="10" y1="32" x2="18" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="46" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
</svg>
