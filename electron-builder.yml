appId: com.plug.app
productName: Plug
copyright: Copyright © 2026 Plug
icon: build/icon.png

directories:
  output: dist
  buildResources: build

# electron-vite emits the built app into out/; package that plus prod deps.
files:
  - out/**/*
  - package.json
  - "!**/*.map"

# esbuild-wasm is fetched at runtime and must stay outside the asar archive.
asarUnpack:
  - "**/*.wasm"

# Ship the browser-relay Chrome extension alongside the app.
extraResources:
  - from: chrome-extension
    to: chrome-extension
  - from: templates
    to: templates

mac:
  icon: build/icon.png
  category: public.app-category.productivity
  # Signing/notarization are decided at CI time: with certs the workflow signs
  # and notarizes; without, it builds unsigned (CSC_IDENTITY_AUTO_DISCOVERY=false).
  target:
    - target: dmg
      arch:
        - arm64

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
